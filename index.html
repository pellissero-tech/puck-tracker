<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c10">
<link rel="manifest" href="manifest.json">
<title>PUCK TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c10;--panel:#0d1318;--border:rgba(0,220,255,0.12);
  --accent:#00dcff;--red:#ff3c5a;--gold:#ffc040;
  --text:#cde8f0;--dim:#3a6070;--green:#00ff88;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;touch-action:manipulation;}
#loadScreen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.5s;}
.load-logo{font-family:'Bebas Neue';font-size:3rem;letter-spacing:8px;color:var(--accent);text-shadow:0 0 40px rgba(0,220,255,0.6);}
.load-logo em{color:var(--red);font-style:normal;}
.load-bar-wrap{width:240px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.load-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--red));border-radius:2px;transition:width 0.3s ease;}
.load-status{font-family:'JetBrains Mono';font-size:0.68rem;letter-spacing:2px;color:var(--dim);}
.load-note{font-family:'JetBrains Mono';font-size:0.6rem;color:rgba(0,220,255,0.25);letter-spacing:1px;text-align:center;max-width:260px;line-height:1.7;}
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.5s;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:5px;color:var(--accent);}
.logo em{color:var(--red);font-style:normal;}
.badges{display:flex;gap:8px;align-items:center;}
.badge{font-family:'JetBrains Mono';font-size:0.58rem;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;border:1px solid var(--border);color:var(--dim);}
.badge.on{color:var(--green);border-color:rgba(0,255,136,0.3);animation:blink 2s infinite;}
.badge.warn{color:var(--gold);border-color:rgba(255,192,64,0.3);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
.video-wrap{position:relative;flex:1;background:#000;overflow:hidden;}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#overlayCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}
.speed-hud{position:absolute;top:14px;left:14px;z-index:3;pointer-events:none;}
.speed-num{font-family:'Bebas Neue';font-size:4.5rem;line-height:1;color:var(--accent);text-shadow:0 0 30px rgba(0,220,255,0.7);transition:color 0.15s;}
.speed-num.fast{color:var(--red);text-shadow:0 0 30px rgba(255,60,90,0.7);}
.speed-unit{font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:3px;color:var(--dim);}
.conf-badge{position:absolute;top:14px;right:14px;z-index:3;font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:2px;padding:5px 12px;border-radius:2px;background:rgba(0,0,0,0.5);border:1px solid var(--border);color:var(--dim);backdrop-filter:blur(4px);transition:all 0.2s;}
.conf-badge.detected{color:var(--accent);border-color:rgba(0,220,255,0.4);}
.bottom{background:var(--panel);border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.stat-box{text-align:center;}
.stat-v{font-family:'Bebas Neue';font-size:1.6rem;line-height:1;color:var(--accent);}
.stat-v.r{color:var(--red)}.stat-v.g{color:var(--gold)}.stat-v.gr{color:var(--green)}
.stat-l{font-family:'JetBrains Mono';font-size:0.5rem;letter-spacing:1px;color:var(--dim);text-transform:uppercase;}
.controls{display:flex;gap:8px;align-items:center;}
.btn{font-family:'Bebas Neue';letter-spacing:3px;font-size:0.95rem;padding:10px 16px;border-radius:4px;border:none;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.btn-start{background:var(--accent);color:#000;}
.btn-stop{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:0.8rem;}
.cam-sel{flex:1;background:#111820;color:var(--text);border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:1px;padding:8px 10px;outline:none;min-width:0;}
.goal-wrap{display:flex;align-items:center;gap:10px;margin-top:8px;}
.goal-lbl{font-family:'JetBrains Mono';font-size:0.55rem;letter-spacing:1.5px;color:var(--dim);writing-mode:vertical-rl;transform:rotate(180deg);flex-shrink:0;}
.mini-goal{position:relative;flex:1;aspect-ratio:5/2;background:#060e14;border:2px solid #cc2200;border-radius:2px;overflow:hidden;}
.mini-goal::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,0.04) 0,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(255,255,255,0.04) 0,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 28px);background-size:28px 28px;}
.sdot{position:absolute;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);animation:di 0.3s ease;}
.sdot.g{background:var(--red);box-shadow:0 0 6px var(--red);}
.sdot.s{background:var(--accent);box-shadow:0 0 6px var(--accent);}
@keyframes di{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.5)}100%{transform:translate(-50%,-50%) scale(1)}}
.corners{position:absolute;inset:12px;pointer-events:none;z-index:3;}
.c{position:absolute;width:24px;height:24px;border-color:rgba(0,220,255,0.6);border-style:solid;}
.c.tl{top:0;left:0;border-width:2px 0 0 2px}.c.tr{top:0;right:0;border-width:2px 2px 0 0}
.c.bl{bottom:0;left:0;border-width:0 0 2px 2px}.c.br{bottom:0;right:0;border-width:0 2px 2px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:24px;width:300px;max-width:90vw;}
.modal h3{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:4px;color:var(--accent);margin-bottom:16px;}
.modal label{display:block;font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:1.5px;color:var(--dim);margin-bottom:6px;text-transform:uppercase;}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'JetBrains Mono';font-size:1rem;padding:10px 12px;outline:none;margin-bottom:16px;}
.modal input:focus{border-color:var(--accent);}
.modal-note{font-family:'JetBrains Mono';font-size:0.6rem;color:var(--dim);line-height:1.7;margin-bottom:16px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div id="loadScreen">
  <div class="load-logo">PUCK <em>TRACKER</em></div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-status" id="loadStatus">Inizializzazione...</div>
  <div class="load-note">Modello YOLOv8 on-device.<br>Nessuna API richiesta.</div>
</div>

<div id="app">
  <header>
    <div class="logo">PUCK <em>TRACKER</em></div>
    <div class="badges">
      <div class="badge" id="modelBadge">MODELLO</div>
      <div class="badge" id="camBadge">CAM</div>
      <div class="badge" id="fpsBadge">0 FPS</div>
    </div>
  </header>

  <div class="video-wrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="corners">
      <div class="c tl"></div><div class="c tr"></div>
      <div class="c bl"></div><div class="c br"></div>
    </div>
    <div class="speed-hud">
      <div class="speed-num" id="speedNum">—</div>
      <div class="speed-unit">KM/H</div>
    </div>
    <div class="conf-badge" id="confBadge">NO PUCK</div>
  </div>

  <div class="bottom">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-v" id="sSpeed">0</div><div class="stat-l">KM/H</div></div>
      <div class="stat-box"><div class="stat-v g" id="sMax">0</div><div class="stat-l">MAX</div></div>
      <div class="stat-box"><div class="stat-v r" id="sGoals">0</div><div class="stat-l">GOAL</div></div>
      <div class="stat-box"><div class="stat-v gr" id="sShots">0</div><div class="stat-l">TIRI</div></div>
    </div>
    <div class="goal-wrap">
      <div class="goal-lbl">PORTA</div>
      <div class="mini-goal" id="miniGoal"></div>
    </div>
    <div class="controls" style="margin-top:10px;">
      <select class="cam-sel" id="camSel"></select>
      <button class="btn btn-start" id="startBtn" onclick="startCam()">▶ START</button>
      <button class="btn btn-stop hidden" id="stopBtn" onclick="stopCam()">■</button>
      <button class="btn btn-ghost" onclick="showCalib()">⚙</button>
      <button class="btn btn-ghost" onclick="resetStats()">↺</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="calibModal">
  <div class="modal">
    <h3>Calibrazione</h3>
    <label>Larghezza porta reale (cm)</label>
    <input type="number" id="goalWidthCm" value="183" min="50" max="400">
    <label>Confidenza minima (%)</label>
    <input type="number" id="confThreshold" value="35" min="10" max="95">
    <div class="modal-note">
      Porta NHL/IIHF: 183 cm · Street hockey: variabile.<br>
      Abbassa la confidenza se il puck non viene rilevato.
    </div>
    <button class="btn btn-start" style="width:100%" onclick="hideCalib()">✓ SALVA</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  PUCK TRACKER — YOLOv8 TFjs Graph Model
//  Classi dataset: stick(0) -(1) green_biscuit(2)
//                  net(3) puck(4) Snipes_Off(5)
//                  Snipes_On(6) stick_blade(7) — 7 classi totali
// ══════════════════════════════════════════════════

const MODEL_PATH  = './tfjs_model/model.json';
const IMG_SIZE    = 320;
// Indici classi puck nel dataset (4=puck, 2=green biscuit)
const PUCK_CLASSES = new Set([2, 4]);
const CLASS_NAMES  = ['stick','-','green_biscuit','net','puck','Snipes_Off','Snipes_On','stick_blade'];

const S = {
  model: null, stream: null,
  running: false, frameCount: 0,
  shots: 0, goals: 0, maxSpeed: 0,
  history: [],
  lastPos: null, lastTime: null,
  velocity: 0,
  goalWidthCm: 183,
  confThreshold: 0.35,
  inferring: false,
};

const $ = id => document.getElementById(id);
const videoEl    = $('videoEl');
const canvas     = $('overlayCanvas');
const ctx        = canvas.getContext('2d');
const speedNum   = $('speedNum');
const confBadge  = $('confBadge');
const fpsBadge   = $('fpsBadge');
const camBadge   = $('camBadge');
const modelBadge = $('modelBadge');
const miniGoal   = $('miniGoal');

// ── BOOT ──
async function boot() {
  setLoad(10, 'Caricamento TensorFlow.js...');
  await tf.ready();
  setLoad(30, 'WebGL pronto...');

  try {
    setLoad(50, 'Caricamento modello YOLOv8...');
    // YOLOv8 TFjs usa loadGraphModel, NON loadLayersModel
    S.model = await tf.loadGraphModel(MODEL_PATH);
    setLoad(80, 'Warm-up...');
    // Warm-up: prima inferenza è sempre lenta
    const dummy = tf.zeros([1, IMG_SIZE, IMG_SIZE, 3]);
    await S.model.executeAsync(dummy);
    dummy.dispose();
    setLoad(95, 'Pronto!');
    modelBadge.textContent = 'YOLO ON';
    modelBadge.className = 'badge on';
  } catch(e) {
    console.warn('Modello non trovato:', e.message);
    setLoad(80, 'Modalità CV classica...');
    S.model = null;
    modelBadge.textContent = 'CV MODE';
    modelBadge.className = 'badge warn';
  }

  await enumCams();
  setLoad(100, 'Avvio!');
  await sleep(400);
  $('loadScreen').style.opacity = '0';
  $('app').style.opacity = '1';
  setTimeout(() => $('loadScreen').style.display = 'none', 500);
}

function setLoad(pct, msg) {
  $('loadBar').style.width = pct + '%';
  $('loadStatus').textContent = msg;
}

// ── CAMERAS ──
async function enumCams() {
  try {
    await navigator.mediaDevices.getUserMedia({video:true});
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d => d.kind === 'videoinput');
    const sel = $('camSel');
    sel.innerHTML = '';
    cams.forEach((c,i) => {
      const o = document.createElement('option');
      o.value = c.deviceId;
      const lbl = c.label || `Camera ${i+1}`;
      o.textContent = lbl.length > 22 ? lbl.slice(0,20)+'…' : lbl;
      if (/back|rear|post|env/i.test(lbl)) o.selected = true;
      sel.appendChild(o);
    });
  } catch(e) { $('camSel').innerHTML = '<option>Permesso negato</option>'; }
}

async function startCam() {
  const deviceId = $('camSel').value;
  const constraints = { video: deviceId
    ? {deviceId:{exact:deviceId}, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30}}
    : {facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30}} };
  try {
    S.stream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = S.stream;
    await videoEl.play();
    S.running = true;
    $('startBtn').classList.add('hidden');
    $('stopBtn').classList.remove('hidden');
    camBadge.textContent = 'CAM ON'; camBadge.className = 'badge on';
    videoEl.addEventListener('loadedmetadata', () => {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
    }, {once:true});
    S._fpsTimer = setInterval(() => {
      fpsBadge.textContent = S.frameCount + ' FPS';
      S.frameCount = 0;
    }, 1000);
    requestAnimationFrame(loop);
  } catch(e) { alert('Camera error: ' + e.message); }
}

function stopCam() {
  S.running = false;
  if (S.stream) S.stream.getTracks().forEach(t => t.stop());
  clearInterval(S._fpsTimer);
  $('startBtn').classList.remove('hidden');
  $('stopBtn').classList.add('hidden');
  camBadge.textContent = 'CAM'; camBadge.className = 'badge';
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ── MAIN LOOP ──
async function loop() {
  if (!S.running) return;
  S.frameCount++;

  if (S.frameCount % 3 === 0 && !S.inferring) {
    S.inferring = true;
    try {
      const det = S.model ? await inferYOLO() : detectCV();
      if (det) processDetection(det);
      else noPuck();
    } catch(e) { console.warn(e); }
    S.inferring = false;
  }

  drawOverlay();
  requestAnimationFrame(loop);
}

// ── YOLOV8 INFERENCE ──
async function inferYOLO() {
  if (videoEl.readyState < 2) return null;

  const [det] = await tf.tidy(() => {
    // Preprocessing: video → [1, 320, 320, 3] float32 0-1
    const img = tf.browser.fromPixels(videoEl)
      .resizeBilinear([IMG_SIZE, IMG_SIZE])
      .div(255.0)
      .expandDims(0);

    // YOLOv8 TFjs output: [1, num_classes+4, num_anchors]
    // formato: [x_center, y_center, width, height, class0_conf, class1_conf, ...]
    const raw = S.model.execute(img);
    return [raw];
  });

  const data = await det.array();
  det.dispose();

  // data[0] shape: [num_classes+4, num_anchors] → trasponi in [num_anchors, num_classes+4]
  const output = data[0]; // [84, 8400] o simile
  const numAnchors = output[0].length;
  const numClasses = output.length - 4;

  let bestConf = 0, bestX = 0, bestY = 0, bestW = 0, bestH = 0, bestCls = -1;

  for (let a = 0; a < numAnchors; a++) {
    // Trova la classe con confidenza massima tra le classi puck
    for (const cls of PUCK_CLASSES) {
      if (cls >= numClasses) continue;
      const conf = output[4 + cls][a];
      if (conf > bestConf && conf > S.confThreshold) {
        bestConf = conf;
        bestX = output[0][a] / IMG_SIZE;
        bestY = output[1][a] / IMG_SIZE;
        bestW = output[2][a] / IMG_SIZE;
        bestH = output[3][a] / IMG_SIZE;
        bestCls = cls;
      }
    }
  }

  if (bestCls < 0) return null;

  return {
    x: bestX,
    y: bestY,
    w: bestW,
    h: bestH,
    confidence: bestConf,
    type: bestCls === 2 ? 'colored_street' : 'black_ice',
  };
}

// ── FALLBACK CV ──
const cvCanvas = document.createElement('canvas');
const cvCtx    = cvCanvas.getContext('2d');

function detectCV() {
  if (videoEl.readyState < 2) return null;
  const W = 320, H = 180;
  cvCanvas.width = W; cvCanvas.height = H;
  cvCtx.drawImage(videoEl, 0, 0, W, H);
  const data = cvCtx.getImageData(0, 0, W, H).data;

  let dMinX=W,dMinY=H,dMaxX=0,dMaxY=0,dCount=0;
  let cMinX=W,cMinY=H,cMaxX=0,cMaxY=0,cCount=0;

  for (let i=0; i<data.length; i+=4) {
    const r=data[i],g=data[i+1],b=data[i+2];
    const px=(i/4)%W, py=Math.floor((i/4)/W);
    const br=(r+g+b)/3;
    if (br<60&&r<80&&g<80&&b<80) {
      dMinX=Math.min(dMinX,px);dMaxX=Math.max(dMaxX,px);
      dMinY=Math.min(dMinY,py);dMaxY=Math.max(dMaxY,py);dCount++;
    }
    if (r>160&&g>80&&g<160&&b<80) {
      cMinX=Math.min(cMinX,px);cMaxX=Math.max(cMaxX,px);
      cMinY=Math.min(cMinY,py);cMaxY=Math.max(cMaxY,py);cCount++;
    }
  }

  const minS=4,maxS=W*0.12;
  const dW=dMaxX-dMinX,dH=dMaxY-dMinY;
  const cW=cMaxX-cMinX,cH=cMaxY-cMinY;

  if (dCount>8&&dW>minS&&dW<maxS&&dH>minS&&dH<maxS&&dW/Math.max(dH,1)>0.4&&dW/Math.max(dH,1)<2.5)
    return {x:((dMinX+dMaxX)/2)/W,y:((dMinY+dMaxY)/2)/H,w:dW/W,h:dH/H,confidence:Math.min(dCount/80,0.9),type:'black_ice'};

  if (cCount>8&&cW>minS&&cW<maxS&&cH>minS&&cH<maxS)
    return {x:((cMinX+cMaxX)/2)/W,y:((cMinY+cMaxY)/2)/H,w:cW/W,h:cH/H,confidence:Math.min(cCount/60,0.85),type:'colored_street'};

  return null;
}

// ── PROCESS DETECTION ──
function processDetection(det) {
  const px = det.x * canvas.width;
  const py = det.y * canvas.height;
  const now = Date.now();

  const pct = Math.round(det.confidence * 100);
  const lbl = det.type === 'colored_street' ? 'STREET' : 'ICE';
  confBadge.textContent = `⬤ ${lbl} ${pct}%`;
  confBadge.className = 'conf-badge detected';

  // Velocità
  if (S.lastPos && S.lastTime) {
    const dx = px - S.lastPos.x, dy = py - S.lastPos.y;
    const distPx = Math.sqrt(dx*dx + dy*dy);
    const dt = (now - S.lastTime) / 1000;
    if (dt > 0 && distPx > 2) {
      const pxPerCm = det.w > 0
        ? (det.w * canvas.width) / (S.goalWidthCm * 0.15)
        : (canvas.width * 0.38) / S.goalWidthCm;
      const kmh = (distPx / pxPerCm) / dt * 0.036;
      if (kmh > 2 && kmh < 220) {
        S.velocity = Math.round(kmh);
        updateSpeedUI(S.velocity);
      }
    }
  }

  S.lastPos = {x:px,y:py}; S.lastTime = now;
  S.history.push({x:px,y:py,t:now});
  if (S.history.length > 30) S.history.shift();

  // Auto goal detection
  if (det.y > 0.6 && S.velocity > 20) {
    logShot(S.velocity, det.x, (det.y-0.6)/0.4, S.velocity > 50, det.type);
  }
}

function noPuck() {
  confBadge.textContent = 'NO PUCK';
  confBadge.className = 'conf-badge';
}

function updateSpeedUI(kmh) {
  speedNum.textContent = kmh;
  speedNum.className = 'speed-num' + (kmh > 100 ? ' fast' : '');
  $('sSpeed').textContent = kmh;
  if (kmh > S.maxSpeed) { S.maxSpeed = kmh; $('sMax').textContent = kmh; }
}

let lastShotTime = 0;
function logShot(speed, gx, gy, isGoal, type) {
  const now = Date.now();
  if (now - lastShotTime < 2000) return;
  lastShotTime = now;
  S.shots++; if (isGoal) S.goals++;
  $('sShots').textContent = S.shots;
  $('sGoals').textContent = S.goals;
  const dot = document.createElement('div');
  dot.className = 'sdot ' + (isGoal ? 'g' : 's');
  dot.style.left = (gx*100)+'%'; dot.style.top = (gy*100)+'%';
  miniGoal.appendChild(dot);
}

// ── OVERLAY ──
function drawOverlay() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (S.history.length < 2) return;

  for (let i=1; i<S.history.length; i++) {
    const a=S.history[i-1],b=S.history[i];
    const alpha=i/S.history.length;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=`rgba(0,220,255,${alpha*0.7})`;
    ctx.lineWidth=alpha*4; ctx.stroke();
  }

  const last = S.history[S.history.length-1];
  ctx.beginPath(); ctx.arc(last.x,last.y,16,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,220,255,0.8)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(last.x,last.y,6,0,Math.PI*2);
  ctx.fillStyle='#00dcff'; ctx.fill();
  if (S.velocity > 0) {
    ctx.font='bold 14px "JetBrains Mono"';
    ctx.fillStyle=S.velocity>100?'#ff3c5a':'#00dcff';
    ctx.fillText(S.velocity+' km/h', last.x+20, last.y-10);
  }
}

// ── CALIBRATION ──
function showCalib() { $('calibModal').classList.remove('hidden'); }
function hideCalib() {
  S.goalWidthCm = parseFloat($('goalWidthCm').value)||183;
  S.confThreshold = (parseInt($('confThreshold').value)||35)/100;
  $('calibModal').classList.add('hidden');
}
$('calibModal').addEventListener('click', e => { if(e.target===$('calibModal')) hideCalib(); });

function resetStats() {
  S.shots=0;S.goals=0;S.maxSpeed=0;S.velocity=0;
  S.history=[];S.lastPos=null;S.lastTime=null;
  ['sSpeed','sMax','sGoals','sShots'].forEach(id=>$(id).textContent='0');
  speedNum.textContent='—';speedNum.className='speed-num';
  miniGoal.querySelectorAll('.sdot').forEach(d=>d.remove());
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
boot();
</script>
