<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c10">
<link rel="manifest" href="manifest.json">
<title>PUCK TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080c10;--panel:#0d1318;--border:rgba(0,220,255,0.12);--accent:#00dcff;--red:#ff3c5a;--gold:#ffc040;--text:#cde8f0;--dim:#3a6070;--green:#00ff88;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;touch-action:manipulation;}
#loadScreen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.5s;}
.load-logo{font-family:'Bebas Neue';font-size:3rem;letter-spacing:8px;color:var(--accent);}
.load-logo em{color:var(--red);font-style:normal;}
.load-bar-wrap{width:240px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.load-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--red));border-radius:2px;transition:width 0.3s ease;}
.load-status{font-family:'JetBrains Mono';font-size:0.68rem;letter-spacing:2px;color:var(--dim);}
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.5s;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:5px;color:var(--accent);}
.logo em{color:var(--red);font-style:normal;}
.badges{display:flex;gap:8px;align-items:center;}
.badge{font-family:'JetBrains Mono';font-size:0.58rem;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;border:1px solid var(--border);color:var(--dim);}
.badge.on{color:var(--green);border-color:rgba(0,255,136,0.3);animation:blink 2s infinite;}
.badge.warn{color:var(--gold);border-color:rgba(255,192,64,0.3);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
.video-wrap{position:relative;flex:1;background:#000;overflow:hidden;}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#overlayCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}
.speed-hud{position:absolute;top:14px;left:14px;z-index:3;pointer-events:none;}
.speed-num{font-family:'Bebas Neue';font-size:4.5rem;line-height:1;color:var(--accent);text-shadow:0 0 30px rgba(0,220,255,0.7);transition:color 0.15s;}
.speed-num.fast{color:var(--red);text-shadow:0 0 30px rgba(255,60,90,0.7);}
.speed-unit{font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:3px;color:var(--dim);}
.conf-badge{position:absolute;top:14px;right:14px;z-index:3;font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:2px;padding:5px 12px;border-radius:2px;background:rgba(0,0,0,0.5);border:1px solid var(--border);color:var(--dim);transition:all 0.2s;}
.conf-badge.detected{color:var(--accent);border-color:rgba(0,220,255,0.4);}
.zone-flash{position:absolute;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity 0.1s;}
.zone-flash.goal{background:rgba(0,220,255,0.2);}
.zone-flash.miss{background:rgba(255,60,90,0.15);}
#shotLabel{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:5;font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:6px;padding:8px 24px;border-radius:4px;opacity:0;transition:opacity 0.15s;white-space:nowrap;text-align:center;}
#shotLabel.goal{color:#00dcff;background:rgba(0,220,255,0.1);border:1px solid rgba(0,220,255,0.4);}
#shotLabel.miss{color:#ff3c5a;background:rgba(255,60,90,0.1);border:1px solid rgba(255,60,90,0.3);}
.bottom{background:var(--panel);border-top:1px solid var(--border);padding:8px 16px;flex-shrink:0;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.stat-box{text-align:center;}
.stat-v{font-family:'Bebas Neue';font-size:1.5rem;line-height:1;color:var(--accent);}
.stat-v.r{color:var(--red)}.stat-v.g{color:var(--gold)}.stat-v.gr{color:var(--green)}
.stat-l{font-family:'JetBrains Mono';font-size:0.48rem;letter-spacing:1px;color:var(--dim);text-transform:uppercase;}
.goal-section{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.goal-lbl{font-family:'JetBrains Mono';font-size:0.48rem;letter-spacing:1.5px;color:var(--dim);writing-mode:vertical-rl;transform:rotate(180deg);flex-shrink:0;margin-top:4px;}
.goal-outer{flex:1;display:flex;flex-direction:column;gap:2px;}
.miss-top{height:13px;background:rgba(255,60,90,0.06);border:1px solid rgba(255,60,90,0.15);border-radius:3px 3px 0 0;display:flex;align-items:center;justify-content:space-between;padding:0 6px;font-family:'JetBrains Mono';font-size:0.4rem;color:rgba(255,60,90,0.35);letter-spacing:1px;text-transform:uppercase;}
.miss-top.hit{background:rgba(255,60,90,0.15);border-color:rgba(255,60,90,0.4);}
.goal-net{display:flex;gap:2px;}
.miss-side{width:13px;flex-shrink:0;background:rgba(255,60,90,0.06);border:1px solid rgba(255,60,90,0.15);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'JetBrains Mono';font-size:0.38rem;color:rgba(255,60,90,0.35);}
.miss-side.hit{background:rgba(255,60,90,0.15);border-color:rgba(255,60,90,0.4);}
.zones-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:2px;background:#060e14;border:2px solid #cc2200;border-radius:2px;overflow:hidden;aspect-ratio:5/2.2;position:relative;}
.zone{position:relative;display:flex;align-items:center;justify-content:center;background:rgba(0,220,255,0.03);border:1px solid rgba(0,220,255,0.07);transition:background 0.3s;overflow:hidden;}
.zone::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.015) 0,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 10px),repeating-linear-gradient(90deg,rgba(255,255,255,0.015) 0,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 10px);}
.zone-name{font-family:'JetBrains Mono';font-size:0.36rem;color:rgba(255,255,255,0.12);letter-spacing:0.5px;text-align:center;z-index:1;}
.zone-count{position:absolute;bottom:1px;right:2px;font-family:'Bebas Neue';font-size:0.72rem;color:rgba(0,220,255,0.4);z-index:1;}
.zone.hit{border-color:rgba(0,220,255,0.45)!important;}
.zone.hit .zone-name{color:rgba(0,220,255,0.7);}
.zone.hit .zone-count{color:var(--accent);}
.sdot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);animation:di 0.3s ease;z-index:2;pointer-events:none;}
.sdot.g{width:6px;height:6px;background:var(--accent);box-shadow:0 0 5px var(--accent);}
.sdot.m{width:5px;height:5px;background:var(--red);box-shadow:0 0 4px var(--red);}
@keyframes di{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.6)}100%{transform:translate(-50%,-50%) scale(1)}}
.controls{display:flex;gap:8px;align-items:center;}
.btn{font-family:'Bebas Neue';letter-spacing:3px;font-size:0.9rem;padding:9px 14px;border-radius:4px;border:none;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.btn-start{background:var(--accent);color:#000;}
.btn-stop{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:0.75rem;}
.cam-sel{flex:1;background:#111820;color:var(--text);border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono';font-size:0.62rem;letter-spacing:1px;padding:7px 8px;outline:none;min-width:0;}
.corners{position:absolute;inset:12px;pointer-events:none;z-index:3;}
.c{position:absolute;width:24px;height:24px;border-color:rgba(0,220,255,0.6);border-style:solid;}
.c.tl{top:0;left:0;border-width:2px 0 0 2px}.c.tr{top:0;right:0;border-width:2px 2px 0 0}
.c.bl{bottom:0;left:0;border-width:0 0 2px 2px}.c.br{bottom:0;right:0;border-width:0 2px 2px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:20px;width:300px;max-width:90vw;}
.modal h3{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:4px;color:var(--accent);margin-bottom:14px;}
.modal label{display:block;font-family:'JetBrains Mono';font-size:0.62rem;letter-spacing:1.5px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'JetBrains Mono';font-size:1rem;padding:8px 12px;outline:none;margin-bottom:14px;}
.modal-note{font-family:'JetBrains Mono';font-size:0.58rem;color:var(--dim);line-height:1.7;margin-bottom:14px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div id="loadScreen">
  <div class="load-logo">PUCK <em>TRACKER</em></div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-status" id="loadStatus">Inizializzazione...</div>
</div>

<div id="app">
  <header>
    <div class="logo">PUCK <em>TRACKER</em></div>
    <div class="badges">
      <div class="badge" id="modelBadge">MODELLO</div>
      <div class="badge" id="camBadge">CAM</div>
      <div class="badge" id="fpsBadge">0 FPS</div>
    </div>
  </header>

  <div class="video-wrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="corners"><div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div></div>
    <div class="speed-hud"><div class="speed-num" id="speedNum">—</div><div class="speed-unit">KM/H</div></div>
    <div class="conf-badge" id="confBadge">NO PUCK</div>
    <div class="zone-flash" id="zoneFlash"></div>
    <div id="shotLabel"></div>
  </div>

  <div class="bottom">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-v" id="sSpeed">0</div><div class="stat-l">KM/H</div></div>
      <div class="stat-box"><div class="stat-v g" id="sMax">0</div><div class="stat-l">MAX</div></div>
      <div class="stat-box"><div class="stat-v gr" id="sGoals">0</div><div class="stat-l">GOAL</div></div>
      <div class="stat-box"><div class="stat-v r" id="sMiss">0</div><div class="stat-l">MISS</div></div>
    </div>

    <div class="goal-section">
      <div class="goal-lbl">MAPPA TIRI</div>
      <div class="goal-outer">
        <div class="miss-top" id="missTop">
          <span>⬆ MISS TOP</span>
          <span id="missTopCount" style="font-family:'Bebas Neue';font-size:0.8rem;">0</span>
        </div>
        <div class="goal-net">
          <div class="miss-side" id="missLeft">
            <span>◀</span>
            <span id="missLeftCount" style="font-family:'Bebas Neue';font-size:0.75rem;">0</span>
          </div>
          <div class="zones-grid" id="zonesGrid">
            <div class="zone" id="z-top-sx"><span class="zone-name">TOP SX</span><span class="zone-count" id="c-top-sx">0</span></div>
            <div class="zone" id="z-top-dx"><span class="zone-name">TOP DX</span><span class="zone-count" id="c-top-dx">0</span></div>
            <div class="zone" id="z-ctr-sx"><span class="zone-name">CTR SX</span><span class="zone-count" id="c-ctr-sx">0</span></div>
            <div class="zone" id="z-ctr-dx"><span class="zone-name">CTR DX</span><span class="zone-count" id="c-ctr-dx">0</span></div>
            <div class="zone" id="z-bot-sx"><span class="zone-name">BOT SX</span><span class="zone-count" id="c-bot-sx">0</span></div>
            <div class="zone" id="z-bot-dx"><span class="zone-name">BOT DX</span><span class="zone-count" id="c-bot-dx">0</span></div>
          </div>
          <div class="miss-side" id="missRight">
            <span>▶</span>
            <span id="missRightCount" style="font-family:'Bebas Neue';font-size:0.75rem;">0</span>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <select class="cam-sel" id="camSel"></select>
      <button class="btn btn-start" id="startBtn" onclick="startCam()">▶ START</button>
      <button class="btn btn-stop hidden" id="stopBtn" onclick="stopCam()">■</button>
      <button class="btn btn-ghost" onclick="showCalib()">⚙</button>
      <button class="btn btn-ghost" onclick="resetStats()">↺</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="calibModal">
  <div class="modal">
    <h3>Calibrazione</h3>
    <label>Larghezza porta reale (cm)</label>
    <input type="number" id="goalWidthCm" value="183" min="50" max="400">
    <label>Confidenza minima (%)</label>
    <input type="number" id="confThreshold" value="35" min="10" max="95">
    <div class="modal-note">Porta NHL/IIHF: 183 cm.<br>Abbassa la confidenza se il puck non viene rilevato.</div>
    <button class="btn btn-start" style="width:100%" onclick="hideCalib()">✓ SALVA</button>
  </div>
</div>

<script>
const MODEL_PATH   = './tfjs_model/model.json';
const IMG_SIZE     = 320;
const PUCK_CLASSES = new Set([2,4]);
const NET_CLASS    = 3;

const ZONES = [
  {id:'top-sx',xMin:0,  xMax:0.5,yMin:0,   yMax:0.33,label:'Top SX'},
  {id:'top-dx',xMin:0.5,xMax:1.0,yMin:0,   yMax:0.33,label:'Top DX'},
  {id:'ctr-sx',xMin:0,  xMax:0.5,yMin:0.33,yMax:0.67,label:'Center SX'},
  {id:'ctr-dx',xMin:0.5,xMax:1.0,yMin:0.33,yMax:0.67,label:'Center DX'},
  {id:'bot-sx',xMin:0,  xMax:0.5,yMin:0.67,yMax:1.0, label:'Bottom SX'},
  {id:'bot-dx',xMin:0.5,xMax:1.0,yMin:0.67,yMax:1.0, label:'Bottom DX'},
];

const S={
  model:null,stream:null,running:false,frameCount:0,
  goals:0,misses:0,maxSpeed:0,history:[],
  lastPos:null,lastTime:null,velocity:0,
  goalWidthCm:183,confThreshold:0.35,inferring:false,
  netBox:null,netSmooth:null,
  zoneCounts:{'top-sx':0,'top-dx':0,'ctr-sx':0,'ctr-dx':0,'bot-sx':0,'bot-dx':0,'miss-top':0,'miss-left':0,'miss-right':0},
};

const $=id=>document.getElementById(id);
const videoEl=$('videoEl'),canvas=$('overlayCanvas'),ctx=canvas.getContext('2d');
const speedNum=$('speedNum'),confBadge=$('confBadge'),fpsBadge=$('fpsBadge');
const camBadge=$('camBadge'),modelBadge=$('modelBadge');
const zoneFlash=$('zoneFlash'),shotLabel=$('shotLabel');

async function boot(){
  setLoad(10,'Caricamento TensorFlow.js...');
  await tf.ready();
  setLoad(30,'WebGL pronto...');
  try{
    setLoad(50,'Caricamento modello YOLOv8...');
    S.model=await tf.loadGraphModel(MODEL_PATH);
    setLoad(80,'Warm-up...');
    const d=tf.zeros([1,IMG_SIZE,IMG_SIZE,3]);
    await S.model.executeAsync(d);
    d.dispose();
    setLoad(95,'Pronto!');
    modelBadge.textContent='YOLO ON';modelBadge.className='badge on';
  }catch(e){
    console.warn('Modello non caricato:',e.message);
    S.model=null;modelBadge.textContent='CV MODE';modelBadge.className='badge warn';
  }
  await enumCams();
  setLoad(100,'Avvio!');
  await sleep(400);
  $('loadScreen').style.opacity='0';
  $('app').style.opacity='1';
  setTimeout(()=>$('loadScreen').style.display='none',500);
}

function setLoad(p,m){$('loadBar').style.width=p+'%';$('loadStatus').textContent=m;}

async function enumCams(){
  try{
    await navigator.mediaDevices.getUserMedia({video:true});
    const devs=await navigator.mediaDevices.enumerateDevices();
    const cams=devs.filter(d=>d.kind==='videoinput');
    const sel=$('camSel');sel.innerHTML='';
    cams.forEach((c,i)=>{
      const o=document.createElement('option');o.value=c.deviceId;
      const lbl=c.label||`Camera ${i+1}`;
      o.textContent=lbl.length>22?lbl.slice(0,20)+'…':lbl;
      if(/back|rear|post|env/i.test(lbl))o.selected=true;
      sel.appendChild(o);
    });
  }catch(e){$('camSel').innerHTML='<option>Permesso negato</option>';}
}

async function startCam(){
  const deviceId=$('camSel').value;
  const constraints={video:deviceId?{deviceId:{exact:deviceId},width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}}:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}}};
  try{
    S.stream=await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject=S.stream;await videoEl.play();S.running=true;
    $('startBtn').classList.add('hidden');$('stopBtn').classList.remove('hidden');
    camBadge.textContent='CAM ON';camBadge.className='badge on';
    videoEl.addEventListener('loadedmetadata',()=>{canvas.width=videoEl.videoWidth;canvas.height=videoEl.videoHeight;},{once:true});
    S._fpsTimer=setInterval(()=>{fpsBadge.textContent=S.frameCount+' FPS';S.frameCount=0;},1000);
    requestAnimationFrame(loop);
  }catch(e){alert('Camera error: '+e.message);}
}

function stopCam(){
  S.running=false;
  if(S.stream)S.stream.getTracks().forEach(t=>t.stop());
  clearInterval(S._fpsTimer);
  $('startBtn').classList.remove('hidden');$('stopBtn').classList.add('hidden');
  camBadge.textContent='CAM';camBadge.className='badge';
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

async function loop(){
  if(!S.running)return;
  S.frameCount++;
  if(S.frameCount%3===0&&!S.inferring){
    S.inferring=true;
    try{
      const r=S.model?await inferYOLO():{puck:detectCV(),net:null};
      if(r.puck)processDetection(r.puck);
      else noPuck();
    }catch(e){console.warn(e);}
    S.inferring=false;
  }
  drawOverlay();
  requestAnimationFrame(loop);
}

async function inferYOLO(){
  if(videoEl.readyState<2)return{puck:null,net:null};
  const raw=await tf.tidy(()=>{
    const img=tf.browser.fromPixels(videoEl).resizeBilinear([IMG_SIZE,IMG_SIZE]).div(255.0).expandDims(0);
    return S.model.execute(img);
  });
  const data=await raw.array();raw.dispose();
  const output=data[0];
  const numAnchors=output[0].length;
  const numClasses=output.length-4;
  let bPuckConf=0,bPuck=null,bNetConf=0,bNet=null;
  for(let a=0;a<numAnchors;a++){
    const cx=output[0][a]/IMG_SIZE,cy=output[1][a]/IMG_SIZE;
    const w=output[2][a]/IMG_SIZE,h=output[3][a]/IMG_SIZE;
    for(const cls of PUCK_CLASSES){
      if(cls>=numClasses)continue;
      const conf=output[4+cls][a];
      if(conf>bPuckConf&&conf>S.confThreshold){bPuckConf=conf;bPuck={x:cx,y:cy,w,h,confidence:conf,type:cls===2?'colored_street':'black_ice'};}
    }
    if(NET_CLASS<numClasses){
      const conf=output[4+NET_CLASS][a];
      if(conf>bNetConf&&conf>0.3){bNetConf=conf;bNet={x:cx,y:cy,w,h,confidence:conf};}
    }
  }
  if(bNet){
    if(!S.netSmooth)S.netSmooth={...bNet};
    else{const a=0.3;S.netSmooth.x=S.netSmooth.x*(1-a)+bNet.x*a;S.netSmooth.y=S.netSmooth.y*(1-a)+bNet.y*a;S.netSmooth.w=S.netSmooth.w*(1-a)+bNet.w*a;S.netSmooth.h=S.netSmooth.h*(1-a)+bNet.h*a;}
    S.netBox=S.netSmooth;
  }
  return{puck:bPuck,net:bNet};
}

const cvC=document.createElement('canvas'),cvX=cvC.getContext('2d');
function detectCV(){
  if(videoEl.readyState<2)return null;
  const W=320,H=180;cvC.width=W;cvC.height=H;cvX.drawImage(videoEl,0,0,W,H);
  const d=cvX.getImageData(0,0,W,H).data;
  let dMnX=W,dMnY=H,dMxX=0,dMxY=0,dN=0,cMnX=W,cMnY=H,cMxX=0,cMxY=0,cN=0;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2],px=(i/4)%W,py=Math.floor((i/4)/W);
    if((r+g+b)/3<60&&r<80&&g<80&&b<80){dMnX=Math.min(dMnX,px);dMxX=Math.max(dMxX,px);dMnY=Math.min(dMnY,py);dMxY=Math.max(dMxY,py);dN++;}
    if(r>160&&g>80&&g<160&&b<80){cMnX=Math.min(cMnX,px);cMxX=Math.max(cMxX,px);cMnY=Math.min(cMnY,py);cMxY=Math.max(cMxY,py);cN++;}
  }
  const ms=4,mx=W*0.12,dW=dMxX-dMnX,dH=dMxY-dMnY,cW=cMxX-cMnX,cH=cMxY-cMnY;
  if(dN>8&&dW>ms&&dW<mx&&dH>ms&&dH<mx)return{x:((dMnX+dMxX)/2)/W,y:((dMnY+dMxY)/2)/H,w:dW/W,h:dH/H,confidence:Math.min(dN/80,0.9),type:'black_ice'};
  if(cN>8&&cW>ms&&cW<mx&&cH>ms&&cH<mx)return{x:((cMnX+cMxX)/2)/W,y:((cMnY+cMxY)/2)/H,w:cW/W,h:cH/H,confidence:Math.min(cN/60,0.85),type:'colored_street'};
  return null;
}

let lastShotTime=0;
function processDetection(puck){
  const px=puck.x*canvas.width,py=puck.y*canvas.height,now=Date.now();
  confBadge.textContent=`⬤ ${puck.type==='colored_street'?'STREET':'ICE'} ${Math.round(puck.confidence*100)}%`;
  confBadge.className='conf-badge detected';
  if(S.lastPos&&S.lastTime){
    const dx=px-S.lastPos.x,dy=py-S.lastPos.y,distPx=Math.sqrt(dx*dx+dy*dy),dt=(now-S.lastTime)/1000;
    if(dt>0&&distPx>2){
      const pxPerCm=puck.w>0?(puck.w*canvas.width)/(S.goalWidthCm*0.15):(canvas.width*0.38)/S.goalWidthCm;
      const kmh=(distPx/pxPerCm)/dt*0.036;
      if(kmh>2&&kmh<220){S.velocity=Math.round(kmh);updateSpeedUI(S.velocity);}
    }
  }
  S.lastPos={x:px,y:py};S.lastTime=now;
  S.history.push({x:px,y:py,t:now});
  if(S.history.length>30)S.history.shift();

  // Zone detection
  const nb=S.netBox||{x:0.5,y:0.62,w:0.52,h:0.32};
  const nx1=nb.x-nb.w/2,ny1=nb.y-nb.h/2,nx2=nb.x+nb.w/2,ny2=nb.y+nb.h/2;
  const mg=0.08;
  const inX=puck.x>=nx1&&puck.x<=nx2,inY=puck.y>=ny1&&puck.y<=ny2;
  const near=puck.x>=nx1-mg&&puck.x<=nx2+mg&&puck.y>=ny1-mg&&puck.y<=ny2+mg;
  if(!near||now-lastShotTime<1500)return;
  const normX=(puck.x-nx1)/(nx2-nx1),normY=(puck.y-ny1)/(ny2-ny1);
  lastShotTime=now;
  if(inX&&inY){
    const zone=ZONES.find(z=>normX>=z.xMin&&normX<z.xMax&&normY>=z.yMin&&normY<z.yMax);
    if(zone)registerGoal(zone,normX,normY);
  }else{
    if(puck.y<ny1)registerMiss('miss-top');
    else if(puck.x<nx1)registerMiss('miss-left');
    else if(puck.x>nx2)registerMiss('miss-right');
  }
}

function registerGoal(zone,normX,normY){
  S.goals++;S.zoneCounts[zone.id]++;
  $('sGoals').textContent=S.goals;
  $('c-'+zone.id).textContent=S.zoneCounts[zone.id];
  const zEl=$('z-'+zone.id);
  zEl.classList.add('hit');
  zEl.style.background=`rgba(0,220,255,${Math.min(0.08+S.zoneCounts[zone.id]*0.07,0.45)})`;
  const dot=document.createElement('div');
  dot.className='sdot g';dot.style.left=(normX*100)+'%';dot.style.top=(normY*100)+'%';
  $('zonesGrid').appendChild(dot);
  showFlash('goal',zone.label);
}

function registerMiss(type){
  S.misses++;S.zoneCounts[type]++;
  $('sMiss').textContent=S.misses;
  const ids={'miss-top':'missTopCount','miss-left':'missLeftCount','miss-right':'missRightCount'};
  const labels={'miss-top':'MISS TOP','miss-left':'MISS SX','miss-right':'MISS DX'};
  const elIds={'miss-top':'missTop','miss-left':'missLeft','miss-right':'missRight'};
  if(ids[type])$(ids[type]).textContent=S.zoneCounts[type];
  if(elIds[type])$(elIds[type]).classList.add('hit');
  const dot=document.createElement('div');
  dot.className='sdot m';
  if(type==='miss-top'){dot.style.left=(Math.random()*80+10)+'%';dot.style.top='50%';$('missTop').appendChild(dot);}
  else if(type==='miss-left'){dot.style.left='50%';dot.style.top=(Math.random()*80+10)+'%';$('missLeft').appendChild(dot);}
  else if(type==='miss-right'){dot.style.left='50%';dot.style.top=(Math.random()*80+10)+'%';$('missRight').appendChild(dot);}
  showFlash('miss',labels[type]||'MISS');
}

function showFlash(type,label){
  zoneFlash.className='zone-flash '+type;zoneFlash.style.opacity='1';
  shotLabel.textContent=label;shotLabel.className=type;shotLabel.style.opacity='1';
  setTimeout(()=>{zoneFlash.style.opacity='0';shotLabel.style.opacity='0';},700);
}

function noPuck(){confBadge.textContent='NO PUCK';confBadge.className='conf-badge';}

function updateSpeedUI(kmh){
  speedNum.textContent=kmh;speedNum.className='speed-num'+(kmh>100?' fast':'');
  $('sSpeed').textContent=kmh;
  if(kmh>S.maxSpeed){S.maxSpeed=kmh;$('sMax').textContent=kmh;}
}

function drawOverlay(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Draw net box
  if(S.netBox){
    const nb=S.netBox;
    const nx=(nb.x-nb.w/2)*canvas.width,ny=(nb.y-nb.h/2)*canvas.height;
    const nw=nb.w*canvas.width,nh=nb.h*canvas.height;
    ctx.strokeStyle='rgba(204,34,0,0.7)';ctx.lineWidth=2;ctx.setLineDash([5,3]);
    ctx.strokeRect(nx,ny,nw,nh);ctx.setLineDash([]);
    // Zone grid lines
    ctx.strokeStyle='rgba(0,220,255,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(nx+nw/2,ny);ctx.lineTo(nx+nw/2,ny+nh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(nx,ny+nh/3);ctx.lineTo(nx+nw,ny+nh/3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(nx,ny+nh*2/3);ctx.lineTo(nx+nw,ny+nh*2/3);ctx.stroke();
    // Zone labels
    ctx.font='9px "JetBrains Mono"';ctx.fillStyle='rgba(0,220,255,0.28)';ctx.textAlign='center';
    [{t:'TOP SX',x:nx+nw*.25,y:ny+11},{t:'TOP DX',x:nx+nw*.75,y:ny+11},
     {t:'CTR SX',x:nx+nw*.25,y:ny+nh/2+4},{t:'CTR DX',x:nx+nw*.75,y:ny+nh/2+4},
     {t:'BOT SX',x:nx+nw*.25,y:ny+nh-5},{t:'BOT DX',x:nx+nw*.75,y:ny+nh-5}]
    .forEach(l=>ctx.fillText(l.t,l.x,l.y));
    ctx.textAlign='start';
  }
  // Puck trail
  if(S.history.length<2)return;
  for(let i=1;i<S.history.length;i++){
    const a=S.history[i-1],b=S.history[i],alpha=i/S.history.length;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=`rgba(0,220,255,${alpha*0.7})`;ctx.lineWidth=alpha*4;ctx.stroke();
  }
  const last=S.history[S.history.length-1];
  ctx.beginPath();ctx.arc(last.x,last.y,16,0,Math.PI*2);ctx.strokeStyle='rgba(0,220,255,0.8)';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(last.x,last.y,6,0,Math.PI*2);ctx.fillStyle='#00dcff';ctx.fill();
  if(S.velocity>0){ctx.font='bold 14px "JetBrains Mono"';ctx.fillStyle=S.velocity>100?'#ff3c5a':'#00dcff';ctx.fillText(S.velocity+' km/h',last.x+20,last.y-10);}
}

function showCalib(){$('calibModal').classList.remove('hidden');}
function hideCalib(){S.goalWidthCm=parseFloat($('goalWidthCm').value)||183;S.confThreshold=(parseInt($('confThreshold').value)||35)/100;$('calibModal').classList.add('hidden');}
$('calibModal').addEventListener('click',e=>{if(e.target===$('calibModal'))hideCalib();});

function resetStats(){
  S.goals=0;S.misses=0;S.maxSpeed=0;S.velocity=0;S.history=[];S.lastPos=null;S.lastTime=null;S.netBox=null;S.netSmooth=null;
  Object.keys(S.zoneCounts).forEach(k=>S.zoneCounts[k]=0);
  ['sSpeed','sMax','sGoals','sMiss'].forEach(id=>$(id).textContent='0');
  ['top-sx','top-dx','ctr-sx','ctr-dx','bot-sx','bot-dx'].forEach(id=>{$('c-'+id).textContent='0';$('z-'+id).classList.remove('hit');$('z-'+id).style.background='';});
  ['missTopCount','missLeftCount','missRightCount'].forEach(id=>$(id).textContent='0');
  ['missTop','missLeft','missRight'].forEach(id=>$(id).classList.remove('hit'));
  speedNum.textContent='—';speedNum.className='speed-num';
  $('zonesGrid').querySelectorAll('.sdot').forEach(d=>d.remove());
  $('missTop').querySelectorAll('.sdot').forEach(d=>d.remove());
  $('missLeft').querySelectorAll('.sdot').forEach(d=>d.remove());
  $('missRight').querySelectorAll('.sdot').forEach(d=>d.remove());
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
boot();
</script>
